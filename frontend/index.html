<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Railway Planner Pro</title>
    <style>
        :root { --primary: #2563eb; --success: #10b981; --bg: #f8fafc; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); padding: 40px 20px; line-height: 1.5; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 800px; margin: auto; }
        
        .input-group { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        .suggestions-box { 
            position: absolute; top: 100%; left: 0; right: 0; background: white; 
            border: 1px solid #e2e8f0; border-radius: 0 0 8px 8px; z-index: 1000; 
            max-height: 200px; overflow-y: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .suggestion-item { padding: 12px; cursor: pointer; color: #334155; }
        .suggestion-item:hover { background: #f1f5f9; }

        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        button:hover { background: #1d4ed8; }
        
        .split-view { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .route-card { padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; background: white; }
        .stats-card { margin-top: 15px; padding: 12px; background: #eff6ff; border-radius: 8px; font-size: 0.85em; color: #1e40af; border: 1px solid #dbeafe; }
        .leg-row { font-size: 0.85em; padding: 6px 0; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; color: #475569; }
        .alt-card { padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0;">Railway Optimizer</h2>
    
    <div class="input-group">
        <input type="text" id="origin" oninput="handleInput(this)" placeholder="Origin Station" autocomplete="off">
        <div id="origin-suggestions" class="suggestions-box"></div>
    </div>
    <div class="input-group">
        <input type="text" id="destination" oninput="handleInput(this)" placeholder="Destination Station" autocomplete="off">
        <div id="destination-suggestions" class="suggestions-box"></div>
    </div>

    <button onclick="findRoute()">Find Optimal Routes</button>
    <div id="result"></div>
</div>

<script>
async function handleInput(inputElement) {
    const query = inputElement.value;
    const boxId = `${inputElement.id}-suggestions`;
    const suggestionBox = document.getElementById(boxId);

    if (query.length < 1) { suggestionBox.innerHTML = ''; return; }

    const res = await fetch(`/api/suggestions?query=${query}`);
    const data = await res.json();
    
    suggestionBox.innerHTML = '';
    data.suggestions.forEach(city => {
        const div = document.createElement('div');
        div.className = 'suggestion-item';
        div.innerText = city;
        div.onclick = () => { inputElement.value = city; suggestionBox.innerHTML = ''; };
        suggestionBox.appendChild(div);
    });
}

document.addEventListener('click', (e) => {
    if (!e.target.closest('.input-group')) {
        document.querySelectorAll('.suggestions-box').forEach(box => box.innerHTML = '');
    }
});

function renderLegs(legs) {
    return legs.map(leg => `
        <div class="leg-row">
            <span><strong>${leg.from}</strong> → <strong>${leg.to}</strong></span>
            <span>${leg.dep} — ${leg.arr}</span>
        </div>
    `).join('');
}

async function findRoute() {
    const origin = document.getElementById('origin').value;
    const destination = document.getElementById('destination').value;
    const resultDiv = document.getElementById('result');
    
    resultDiv.innerHTML = "<p>Analyzing network topology...</p>";

    try {
        const response = await fetch(`/api/all-routes?origin=${origin}&destination=${destination}`);
        const data = await response.json();

        if (response.ok) {
            const perf = data.performance; 

            let html = `
                <div class="split-view">
                    <div class="route-card">
                        <h3>Cheapest Route</h3>
                        ${renderLegs(data.best_cost.legs)}
                        <p style="margin-top:10px;"><strong>Cost: </strong>₹${data.best_cost.cost} | <strong>Time:</strong> ${data.best_cost.time}h</p>
                    </div>
                    <div class="route-card">
                        <h3>Fastest Route</h3>
                        ${renderLegs(data.best_time.legs)}
                        <p style="margin-top:10px;"><strong>Cost: </strong>₹${data.best_time.cost} | <strong>Time:</strong> ${data.best_time.time}h</p>
                    </div>
                </div>
                
                <div class="stats-card">
                    <strong>Engine Metrics:</strong> ${perf.algorithm} algo explored <strong>${perf.nodes_explored}</strong> nodes out of 12. 
                    <span style="float: right;">(Efficiency optimized via search space pruning)</span>
                </div>

                <h4 style="margin-top:30px;">Alternative Options</h4>
                ${data.all_routes.map(r => `
                    <div class="alt-card">
                        <span>${r.path.join(' → ')}</span>
                        <span><strong>₹${r.cost}</strong> | ${r.time}h</span>
                    </div>
                `).join('')}
            `;
            resultDiv.innerHTML = html;
        } else {
            resultDiv.innerHTML = `<p style='color:red;'>${data.detail}</p>`;
        }
    } catch (err) {
        resultDiv.innerHTML = "<p style='color:red;'>Server unavailable.</p>";
    }
}
</script>
</body>
</html>
